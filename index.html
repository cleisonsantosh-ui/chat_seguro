  <style>
    :root {
      --color-bg: #0d0d0d;
      --color-header: #1a1a1a;
      --color-bubble-in: #1e1e1e;
      --color-bubble-out: #3d1a2c;
      --color-text: #f0f0f0;
      --color-text-muted: #888;
      --color-primary: #ec4899;
      --color-primary-dark: #be185d;
      --color-primary-glow: rgba(236, 72, 153, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #080808;
      height: 100dvh;
      width: 100vw;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Container Principal ── */
    .app-container {
      width: 100%;
      max-width: 500px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
      position: relative;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    @media (min-width: 501px) {
      .app-container {
        height: min(860px, 96dvh);
        align-self: center;
        border-radius: 18px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(236, 72, 153, 0.12);
      }
    }

    /* ── Header ── */
    .header {
      background: var(--color-header);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
      box-shadow: 0 1px 0 rgba(236, 72, 153, 0.15);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .back-btn {
      color: var(--color-primary);
      font-size: 22px;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .avatar-box {
      position: relative;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #2a1020;
      border: 2px solid var(--color-primary);
    }

    .online-badge {
      width: 12px;
      height: 12px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--color-header);
      position: absolute;
      bottom: 0;
      right: 0;
    }

    .info-box {
      flex: 1;
      min-width: 0;
    }

    .name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      display: block;
    }

    .status {
      font-size: 12px;
      color: #22c55e;
      display: block;
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      gap: 18px;
      color: var(--color-text-muted);
      padding-right: 2px;
    }

    /* ── Chat Window ── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background-color: var(--color-bg);
      background-image: radial-gradient(ellipse at top left, rgba(236, 72, 153, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at bottom right, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
      scroll-behavior: smooth;
    }

    .chat-window::-webkit-scrollbar {
      width: 0;
    }

    .date-label {
      align-self: center;
      background: rgba(255, 255, 255, 0.06);
      color: var(--color-text-muted);
      padding: 4px 14px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 8px 0 14px;
    }

    /* ── Bolhas ── */
    .row {
      display: flex;
      flex-direction: column;
      max-width: 83%;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
    }

    .row.show {
      opacity: 1;
      transform: translateY(0);
    }

    .row.left {
      align-self: flex-start;
    }

    .row.right {
      align-self: flex-end;
    }

    .bubble {
      padding: 8px 12px 10px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--color-text);
      position: relative;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .left .bubble {
      background: var(--color-bubble-in);
      border-radius: 0 14px 14px 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .right .bubble {
      background: var(--color-bubble-out);
      border-radius: 14px 0 14px 14px;
      align-self: flex-end;
      border: 1px solid rgba(236, 72, 153, 0.2);
    }

    .time {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      float: right;
      margin: 5px 0 -2px 10px;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .right .time .ticks {
      color: var(--color-primary);
    }



    /* ── Foto Premium ── */
    .photo-card {
      max-width: 260px;
      border-radius: 14px;
      overflow: hidden;
      background: #1a0d14;
      margin-bottom: 4px;
      position: relative;
      border: 2px solid rgba(236, 72, 153, 0.25);
    }

    .photo-card img {
      width: 100%;
      height: auto;
      display: block;
      filter: blur(14px);
      transition: filter 1.1s ease;
      aspect-ratio: 4/5;
      object-fit: cover;
    }

    .photo-card.reveal img {
      filter: blur(0);
    }

    .photo-meta {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
      color: #fff;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── Typing Indicator ── */
    .typing-pill {
      align-self: flex-start;
      background: var(--color-bubble-in);
      padding: 11px 16px;
      border-radius: 0 14px 14px 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: none;
      margin-bottom: 6px;
    }

    .typing-pill .dot {
      width: 6px;
      height: 6px;
      background: var(--color-primary);
      border-radius: 50%;
      display: inline-block;
      animation: dots 1.4s infinite ease-in-out;
      margin: 0 2px;
      opacity: 0.6;
    }

    @keyframes dots {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.3;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ── Área de Botões ── */
    .actions {
      padding: 12px 14px 16px;
      background: var(--color-header);
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid rgba(236, 72, 153, 0.12);
    }

    .actions.hidden {
      display: none;
    }

    .action-btn {
      width: 100%;
      height: 52px;
      border-radius: 28px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      text-decoration: none;
    }

    .action-btn:active {
      transform: scale(0.96);
    }

    .btn-main {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      color: #fff;
      box-shadow: 0 4px 18px var(--color-primary-glow);
    }

    .btn-alt {
      background: rgba(255, 255, 255, 0.06);
      color: var(--color-text-muted);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-wa {
      background: linear-gradient(135deg, #25D366, #1ead56);
      color: #fff;
      gap: 10px;
      box-shadow: 0 4px 18px rgba(37, 211, 102, 0.3);
    }

    .btn-wa svg {
      fill: #fff;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ── Pulse no badge online ── */
    @keyframes pulse-green {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0);
      }
    }

    .online-badge {
      animation: pulse-green 2s infinite;
    }
  </style>
</head>

<body>
  <div class="app-container">

    <!-- ── Chat Area ── -->

      <div class="typing-pill" id="typing">

  <script>
    /* ── Utils ── */
    const chat = document.getElementById('chat');
    const typing = document.getElementById('typing');
    const btns = document.getElementById('btns');

    const wait = ms => new Promise(r => setTimeout(r, ms));

    function getTime() {
      const n = new Date();
      return n.getHours().toString().padStart(2, '0') + ':' + n.getMinutes().toString().padStart(2, '0');
    }

    function scroll() {
      chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    }

    /* Mostra indicador de digitação por [ms] */
    async function showTyping(ms) {
      typing.style.display = 'block';
      scroll();
      await wait(ms);
      typing.style.display = 'none';
    }

    /* Adiciona bolha de texto */
    function addMsg(text, right = false) {
      const row = document.createElement('div');
      row.className = `row ${right ? 'right' : 'left'}`;

      const bub = document.createElement('div');
      bub.className = 'bubble';

      const ticks = right ? ' <span class="ticks">✓✓</span>' : '';
      bub.innerHTML = `${text} <span class="time">${getTime()}${ticks}</span>`;

      row.appendChild(bub);
      chat.insertBefore(row, typing);

      setTimeout(() => { row.classList.add('show'); scroll(); }, 40);
    }



    /* Bloco de foto com blur que revela */
    function addPhoto(src) {
      const row = document.createElement('div');
      row.className = 'row left';

      const card = document.createElement('div');
      card.className = 'photo-card';
      card.innerHTML = `
        <img src="${src}" alt="Foto da Sofia" loading="lazy">
        <div class="photo-meta">
          <span>🔒 foto exclusiva</span>
          <span>${getTime()}</span>
        </div>`;

      row.appendChild(card);
      chat.insertBefore(row, typing);

      setTimeout(() => {
        row.classList.add('show');
        scroll();
        setTimeout(() => card.classList.add('reveal'), 1000);
      }, 40);
    }

    /* Renderiza botões */
    function showButtons(list) {
      btns.innerHTML = '';
      if (!list || !list.length) { btns.classList.add('hidden'); return; }

      list.forEach(item => {
        if (item.type === 'link') {
          const a = document.createElement('a');
          a.href = "javascript:void(0);";
          a.onclick = () => gtag_report_conversion(item.url);
          a.className = `action-btn ${item.cls || 'btn-wa'}`;
          a.innerHTML = item.label;
          btns.appendChild(a);
        } else {
          const b = document.createElement('button');
          b.className = `action-btn ${item.cls || 'btn-main'}`;
          b.innerHTML = item.label;
          b.onclick = () => {
            addMsg(item.label, true);
            showButtons([]);
            item.fn();
          };
          btns.appendChild(b);
        }
      });

      btns.classList.remove('hidden');
      scroll();
    }
